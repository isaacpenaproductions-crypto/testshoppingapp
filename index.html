<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List App</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container glass-panel">
        <header>
            <div class="logo-icon">🛒</div>
            <h1>Shopping List</h1>
        </header>

        <form id="add-item-form" autocomplete="off">
            <input 
                type="text" 
                id="item-input" 
                placeholder="What do you need to buy?" 
                required 
                autofocus>
            <button type="submit" id="add-btn">
                Add
            </button>
        </form>

        <div id="status-message" class="hidden"></div>
        <div id="loading-spinner" class="hidden">
            <div class="spinner"></div>
        </div>

        <ul id="shopping-list">
            <!-- List items will be dynamically injected here -->
        </ul>

        <div class="footer-actions">
            <button id="clear-all-btn" class="danger-btn">Clear All</button>
        </div>
    </div>

    <!-- Configure Supabase Credentials and App logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="app.js?v=1.1"></script>
</body>
</html>
